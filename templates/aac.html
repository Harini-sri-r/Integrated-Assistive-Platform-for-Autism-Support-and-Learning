{% extends "base.html" %}

{% block content %}
<div class="text-center mb-2">
    <h1>Assistive Communication (AAC)</h1>
    <p class="text-muted">Build sentences to express yourself.</p>
</div>

<!-- Sentence Strip (STAYS AT TOP) -->
<div class="glass-panel" style="position: sticky; top: 80px; z-index: 100; padding: 1.5rem; margin-bottom: 2rem;">
    <div id="sentence-strip"
        style="min-height: 60px; border: 2px dashed rgba(255,255,255,0.2); border-radius: 12px; padding: 1rem; display: flex; gap: 0.5rem; align-items: center; flex-wrap: wrap; margin-bottom: 1rem; background: rgba(0,0,0,0.1);">
        <span class="text-muted" id="strip-placeholder">Tap icons below to build a sentence...</span>
    </div>

    <div style="display: flex; gap: 1rem; justify-content: center;">
        <button id="btn-play-sentence" class="btn-primary" style="background: #10b981;"><i class="fas fa-play"></i>
            Speak Sentence</button>
        <button id="btn-clear-sentence" class="btn-secondary"><i class="fas fa-trash"></i> Clear</button>
        <button id="btn-save-favorite" class="btn-secondary" style="border-color: #facc15; color: #facc15;"><i
                class="fas fa-heart"></i> Save to Favorites</button>
    </div>
</div>

<!-- Favorites Section -->
<div id="favorites-section" class="aac-section mb-2" style="display: none;">
    <h3><i class="fas fa-heart" style="color: #facc15;"></i> Favorites</h3>
    <div id="grid-favorites" class="aac-grid" style="grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));">
    </div>
</div>

<div class="aac-section mb-2">
    <h3><i class="fas fa-star" style="color: #facc15;"></i> Basics</h3>
    <div id="grid-basics" class="aac-grid"></div>
</div>

<div class="aac-section mb-2">
    <h3><i class="fas fa-users" style="color: #a855f7;"></i> People</h3>
    <div id="grid-people" class="aac-grid"></div>
</div>

<div class="aac-section mb-2">
    <h3><i class="fas fa-smile" style="color: #4ade80;"></i> Emotions</h3>
    <div id="grid-emotions" class="aac-grid"></div>
</div>

<div class="aac-section mb-2">
    <h3><i class="fas fa-utensils" style="color: #fb923c;"></i> Food</h3>
    <div id="grid-food" class="aac-grid"></div>
</div>

<div class="aac-section mb-2">
    <h3><i class="fas fa-map-marker-alt" style="color: #f87171;"></i> Places</h3>
    <div id="grid-places" class="aac-grid"></div>
</div>

<div class="aac-section mb-2">
    <h3><i class="fas fa-bolt" style="color: #60a5fa;"></i> Activities</h3>
    <div id="grid-activities" class="aac-grid"></div>
</div>

<div class="aac-section mb-2">
    <h3><i class="fas fa-handshake" style="color: #f472b6;"></i> Social</h3>
    <div id="grid-social" class="aac-grid"></div>
</div>

<style>
    .aac-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
        gap: 1rem;
        margin-top: 1rem;
    }

    .aac-btn {
        transition: transform 0.1s, background 0.2s;
        border: 2px solid rgba(255, 255, 255, 0.1) !important;
    }

    .aac-btn:active {
        transform: scale(0.95);
        background: rgba(99, 102, 241, 0.4) !important;
    }

    .sentence-chip {
        background: rgba(99, 102, 241, 0.2);
        border: 1px solid #6366f1;
        padding: 0.5rem 1rem;
        border-radius: 8px;
        font-weight: bold;
        animation: popIn 0.3s ease-out;
    }

    @keyframes popIn {
        0% {
            transform: scale(0);
            opacity: 0;
        }

        100% {
            transform: scale(1);
            opacity: 1;
        }
    }
</style>
{% endblock %}

{% block scripts %}
<script src="{{ url_for('static', filename='js/aac.js') }}"></script>
{% endblock %}

{% extends "base.html" %}

{% block content %}
<div class="glass-panel" style="max-width: 600px; margin: 0 auto; height: 75vh; display: flex; flex-direction: column; padding: 1.5rem;">
    <div class="chat-header mb-2"
        style="border-bottom: 1px solid var(--border); padding-bottom: 1rem; display: flex; align-items: center; gap: 1rem;">
        <div style="font-size: 2rem; background: var(--input-bg); width: 60px; height: 60px; border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: var(--shadow);">
            🤖
        </div>
        <div>
            <h2 style="margin-bottom: 0;">AI Companion</h2>
            <p style="color: var(--text-muted); font-size: 0.9rem; margin-top: 0;">Always here to listen.</p>
        </div>
    </div>

    <!-- Chat messages area -->
    <div id="chat-history" style="flex: 1; overflow-y: auto; padding: 1rem 0; display: flex; flex-direction: column; gap: 1rem; scroll-behavior: smooth;">
        <!-- Initial Message -->
        <div class="message bot-message">
            Hi {{ current_user.username }}! I'm your AI friend. How are you feeling today?
            <div class="message-time">Just now</div>
        </div>
    </div>
    
    <!-- Suggestions container (Pills) -->
    <div id="suggestions-container" style="display: flex; gap: 0.5rem; flex-wrap: wrap; margin-bottom: 1rem; min-height: 40px; align-items: center;">
        <!-- Dynamic suggestions will go here -->
    </div>

    <!-- Input area -->
    <div class="chat-input-area" style="display: flex; gap: 0.5rem; align-items: center;">
        <button id="tts-btn" class="btn-voice" title="Toggle AI Voice Output" style="width: 45px; height: 45px;">
            <i class="fas fa-volume-up"></i>
        </button>
        <button id="mic-btn" class="btn-voice" title="Click to speak">
            <i class="fas fa-microphone"></i>
        </button>
        <input type="text" id="chat-input" class="form-input" placeholder="Type a message..." style="border-radius: 25px; flex: 1;">
        <button id="send-btn" class="btn-send" title="Send message">
            <i class="fas fa-paper-plane"></i>
        </button>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script src="{{ url_for('static', filename='js/chatbot.js') }}"></script>
{% endblock %}

{% extends "base.html" %}

{% block head %}
<!-- Load face-api.js from CDN -->

<style>
    #video-container {
        position: relative;
        width: 100%;
        max-width: 640px;
        margin: 0 auto;
        border-radius: 16px;
        overflow: hidden;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
    }

    video {
        width: 100%;
        height: auto;
        display: block;
        transform: scaleX(-1);
        /* Mirror effect */
    }

    canvas {
        position: absolute;
        top: 0;
        left: 0;
    }

    .status-message {
        font-size: 1.5rem;
        font-weight: 600;
        text-align: center;
        margin: 1.5rem 0;
        min-height: 3rem;
        color: var(--accent);
    }

    .capture-list {
        display: flex;
        gap: 1rem;
        justify-content: center;
        margin: 1.5rem 0;
        flex-wrap: wrap;
    }

    .capture-item {
        width: 60px;
        height: 60px;
        border-radius: 50%;
        background: rgba(74, 222, 128, 0.2);
        border: 3px solid #4ade80;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 1.5rem;
        transition: all 0.3s;
    }

    .capture-item.pending {
        background: rgba(148, 163, 184, 0.2);
        border-color: #94a3b8;
    }

    .progress-bar {
        width: 100%;
        max-width: 400px;
        height: 8px;
        background: rgba(255, 255, 255, 0.1);
        border-radius: 4px;
        margin: 1rem auto;
        overflow: hidden;
    }

    .progress-fill {
        height: 100%;
        background: linear-gradient(90deg, #4ade80, #22c55e);
        width: 0%;
        transition: width 0.3s;
    }
</style>
{% endblock %}

{% block content %}
<div class="glass-panel text-center">
    <h1 class="mb-2">Register Your Face</h1>
    <p class="mb-2" style="color: var(--text-muted);">
        We'll capture multiple samples of your face to improve recognition accuracy.
    </p>

    <div id="video-container" style="display: none;">
        <video id="video" width="640" height="480" autoplay muted></video>
    </div>

    <div class="status-message" id="status-message">
        Loading AI Models...
    </div>

    <div class="progress-bar">
        <div class="progress-fill" id="progress-fill"></div>
    </div>

    <div class="capture-list" id="capture-list">
        <div class="capture-item pending"><i class="fas fa-camera"></i></div>
        <div class="capture-item pending"><i class="fas fa-camera"></i></div>
        <div class="capture-item pending"><i class="fas fa-camera"></i></div>
        <div class="capture-item pending"><i class="fas fa-camera"></i></div>
        <div class="capture-item pending"><i class="fas fa-camera"></i></div>
    </div>

    <div class="mt-2">
        <button id="start-btn" class="btn-primary" disabled>
            <i class="fas fa-video"></i> Start Registration
        </button>
        <button id="capture-btn" class="btn-secondary" style="display: none;">
            <i class="fas fa-camera"></i> Capture Sample
        </button>
        <a href="{{ url_for('dashboard') }}" class="btn-secondary">
            <i class="fas fa-arrow-left"></i> Back to Dashboard
        </a>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script src="{{ url_for('static', filename='js/face_register.js') }}"></script>
{% endblock %}

{% extends "base.html" %}

{% block content %}
<div class="text-center mb-2">
    <h1>Emotion Matcher</h1>
    <p>Find the matching pairs of emotions!</p>
    <div style="font-size: 1.5rem; margin-top: 1rem;">Score: <span id="score">0</span> | Moves: <span
            id="moves">0</span></div>
</div>

<div class="glass-panel" style="max-width: 600px; margin: 0 auto;">
    <div id="game-grid" style="display: grid; grid-template-columns: repeat(4, 1fr); gap: 1rem; perspective: 1000px;">
        <!-- Cards generated by JS -->
    </div>

    <div id="game-over" style="display: none; text-align: center; margin-top: 2rem;">
        <h2>🎉 Well Done!</h2>
        <button onclick="location.reload()" class="btn-primary mt-2">Play Again</button>
        <a href="{{ url_for('games') }}" class="btn-primary"
            style="background: rgba(255,255,255,0.2); margin-left: 1rem;">Back to Hub</a>
    </div>
</div>

<style>
    .card {
        height: 100px;
        position: relative;
        transform-style: preserve-3d;
        transition: transform 0.5s;
        cursor: pointer;
    }

    .card.flipped {
        transform: rotateY(180deg);
    }

    .card-face {
        position: absolute;
        width: 100%;
        height: 100%;
        backface-visibility: hidden;
        display: flex;
        align-items: center;
        justify-content: center;
        border-radius: 10px;
        font-size: 3rem;
        background: rgba(255, 255, 255, 0.1);
        border: 1px solid rgba(255, 255, 255, 0.3);
    }

    .card-back {
        background: linear-gradient(135deg, #6366f1, #a855f7);
        color: white;
        font-size: 2rem;
    }

    .card-front {
        transform: rotateY(180deg);
        background: white;
    }
</style>
{% endblock %}

{% block scripts %}
<script src="{{ url_for('static', filename='js/games_emotion.js') }}"></script>
{% endblock %}

{% extends "base.html" %}

{% block head %}
<style>
    .game-grid {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 1rem;
        max-width: 600px;
        margin: 0 auto;
    }

    .card {
        background-color: transparent;
        width: 100%;
        padding-top: 100%;
        /* 1:1 Aspect Ratio */
        position: relative;
        perspective: 1000px;
        cursor: pointer;
    }

    .card-inner {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        text-align: center;
        transition: transform 0.6s;
        transform-style: preserve-3d;
        border-radius: 12px;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
    }

    .card.flipped .card-inner {
        transform: rotateY(180deg);
    }

    .card-front,
    .card-back {
        position: absolute;
        width: 100%;
        height: 100%;
        -webkit-backface-visibility: hidden;
        backface-visibility: hidden;
        display: flex;
        align-items: center;
        justify-content: center;
        border-radius: 12px;
        font-size: 2rem;
    }

    .card-front {
        background-color: #2e3b4e;
        color: white;
    }

    .card-back {
        background-color: #4ade80;
        color: white;
        transform: rotateY(180deg);
    }

    .stats {
        display: flex;
        justify-content: space-around;
        margin-bottom: 2rem;
        font-size: 1.2rem;
    }
</style>
{% endblock %}

{% block content %}
<div class="glass-panel text-center">
    <!-- Back Button -->
    <div style="text-align: left; margin-bottom: 1rem;">
        <a href="{{ url_for('games') }}" class="btn-text">
            <i class="fas fa-arrow-left"></i> Back to Games
        </a>
    </div>

    <h1>Memory Match</h1>
    <p class="mb-2">Find all the matching pairs!</p>

    <div class="stats">
        <span><i class="fas fa-undo"></i> Moves: <span id="moves">0</span></span>
        <span><i class="fas fa-clock"></i> Time: <span id="timer">00:00</span></span>
    </div>

    <div class="game-grid" id="grid">
        <!-- Cards generated by JS -->
    </div>

    <div id="game-over" style="display: none; margin-top: 2rem;">
        <h2><i class="fas fa-trophy" style="color: gold;"></i> Great Job!</h2>
        <button onclick="initGame()" class="btn-primary" style="margin-top: 1rem;">Play Again</button>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    const icons = [
        '🐶', '🐱', '🐭', '🐹',
        '🐰', '🦊', '🐻', '🐼'
    ];

    let cards = [...icons, ...icons];
    let flippedCards = [];
    let matchedPairs = 0;
    let moves = 0;
    let timerStart = null;
    let timerInterval = null;
    let isLocked = false;

    function shuffle(array) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
        return array;
    }

    function initGame() {
        const grid = document.getElementById('grid');
        grid.innerHTML = '';
        document.getElementById('game-over').style.display = 'none';

        cards = shuffle([...icons, ...icons]);
        flippedCards = [];
        matchedPairs = 0;
        moves = 0;
        isLocked = false;

        document.getElementById('moves').textContent = moves;
        clearInterval(timerInterval);
        document.getElementById('timer').textContent = "00:00";
        startTimer();

        cards.forEach((icon, index) => {
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                <div class="card-inner">
                    <div class="card-front"><i class="fas fa-question"></i></div>
                    <div class="card-back">${icon}</div>
                </div>
            `;
            card.dataset.icon = icon;
            card.dataset.index = index;
            card.addEventListener('click', flipCard);
            grid.appendChild(card);
        });
    }

    function startTimer() {
        timerStart = Date.now();
        timerInterval = setInterval(() => {
            const delta = Date.now() - timerStart;
            const seq = Math.floor(delta / 1000);
            const m = Math.floor(seq / 60).toString().padStart(2, '0');
            const s = (seq % 60).toString().padStart(2, '0');
            document.getElementById('timer').textContent = `${m}:${s}`;
        }, 1000);
    }

    function flipCard() {
        if (isLocked) return;
        if (this.classList.contains('flipped')) return;

        this.classList.add('flipped');
        flippedCards.push(this);

        if (flippedCards.length === 2) {
            moves++;
            document.getElementById('moves').textContent = moves;
            isLocked = true;
            checkMatch();
        }
    }

    function checkMatch() {
        const [card1, card2] = flippedCards;
        const match = card1.dataset.icon === card2.dataset.icon;

        if (match) {
            matchedPairs++;
            flippedCards = [];
            isLocked = false;
            if (matchedPairs === icons.length) {
                endGame();
            }
        } else {
            setTimeout(() => {
                card1.classList.remove('flipped');
                card2.classList.remove('flipped');
                flippedCards = [];
                isLocked = false;
            }, 1000);
        }
    }

    function endGame() {
        clearInterval(timerInterval);
        document.getElementById('game-over').style.display = 'block';

        // Log activity
        fetch('/api/log_activity', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                type: 'Game: Memory Match',
                score: 10,
                details: `Completed in ${moves} moves`
            })
        });
    }

    // Start on load
    initGame();
</script>
{% endblock %}

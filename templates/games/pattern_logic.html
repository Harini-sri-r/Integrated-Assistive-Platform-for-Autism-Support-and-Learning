{% extends "base.html" %}

{% block content %}
<div class="text-center mb-2">
    <h1>Pattern Master</h1>
    <p class="text-muted">What comes next in the sequence? Pick the right one!</p>
</div>

<div class="glass-panel" style="max-width: 700px; margin: 0 auto; padding: 2rem; text-align: center;">
    <div id="game-area">
        <div id="pattern-display" class="glass-card mb-4"
            style="display: flex; justify-content: center; align-items: center; gap: 1rem; padding: 2.5rem; font-size: 4rem;">
            <!-- Pattern emojis here -->
            <span>🍎</span>
            <span>🍌</span>
            <span>🍎</span>
            <span
                style="border: 3px dashed var(--accent); border-radius: 10px; width: 80px; height: 80px; display: inline-flex; align-items: center; justify-content: center;">?</span>
        </div>

        <div id="options" style="display: flex; justify-content: center; gap: 1.5rem;">
            <!-- Options here -->
        </div>
    </div>

    <div id="feedback" class="mt-4" style="min-height: 50px; font-size: 1.5rem; font-weight: bold;"></div>

    <div id="game-progress" class="mt-2 text-muted">Sequence 1 of 5</div>
</div>

<script>
    const patterns = [
        { seq: ["🍎", "🍌", "🍎"], next: "🍌", options: ["🍎", "🍌", "🍒"] },
        { seq: ["🚗", "🚲", "🚗", "🚲"], next: "🚗", options: ["🚗", "🚲", "✈️"] },
        { seq: ["⭐", "⭐", "🌙", "⭐", "⭐"], next: "🌙", options: ["⭐", "🌙", "☀️"] },
        { seq: ["🐶", "🐱", "🐭", "🐶", "🐱"], next: "🐭", options: ["🐶", "🐱", "🐭"] },
        { seq: ["🔴", "🔵", "🟢", "🔴", "🔵"], next: "🟢", options: ["🔴", "🔵", "🟢"] }
    ];

    let currentIdx = 0;
    let score = 0;

    function loadPattern() {
        const p = patterns[currentIdx];
        const display = document.getElementById('pattern-display');
        display.innerHTML = p.seq.map(e => `<span>${e}</span>`).join('') +
            `<span style="border: 3px dashed var(--accent); border-radius: 10px; width: 80px; height: 80px; display: inline-flex; align-items: center; justify-content: center; opacity: 0.5;">?</span>`;

        const optionsDiv = document.getElementById('options');
        optionsDiv.innerHTML = p.options.map(opt => `
            <button onclick="checkAnswer('${opt}')" class="glass-card" style="font-size: 3rem; padding: 1rem 2rem; border: 2px solid transparent; transition: all 0.2s;">
                ${opt}
            </button>
        `).join('');

        document.getElementById('feedback').innerText = "";
        document.getElementById('game-progress').innerText = `Sequence ${currentIdx + 1} of ${patterns.length}`;
    }

    async function checkAnswer(choice) {
        const correct = patterns[currentIdx].next;
        const feedback = document.getElementById('feedback');

        if (choice === correct) {
            feedback.innerHTML = '<span style="color: #4ade80">Correct! Next one... ✨</span>';
            score += 10;
        } else {
            feedback.innerHTML = '<span style="color: #f87171">Not quite! That was the wrong one. ❌</span>';
        }

        setTimeout(() => {
            currentIdx++;
            if (currentIdx < patterns.length) {
                loadPattern();
            } else {
                finishGame();
            }
        }, 1500);
    }

    async function finishGame() {
        const area = document.getElementById('game-area');
        area.innerHTML = `
            <div class="glass-card" style="padding: 3rem;">
                <h2 style="font-size: 3rem;">Great Logic!</h2>
                <p style="font-size: 1.5rem; margin: 1rem 0;">You finished all the patterns!</p>
                <div style="font-size: 5rem; margin-bottom: 1rem;">🏆</div>
                <button class="btn-primary" onclick="window.location.href='/games'">Back to Hub</button>
            </div>
        `;
        document.getElementById('feedback').innerText = "";

        await fetch('/api/log_activity', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                type: 'Logic Master',
                score: score,
                details: `Solved pattern sequences with score ${score}/50`
            })
        });
    }

    loadPattern();
</script>
{% endblock %}

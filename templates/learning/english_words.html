{% extends "base.html" %}
{% block content %}
<div class="glass-panel" style="max-width: 850px; margin: 2rem auto; padding: 2rem;">
    <div style="text-align: center; margin-bottom: 2rem;">
        <h2 style="font-size: 2.5rem; color: var(--accent-1);">English Word Excellence</h2>
        <p style="opacity: 0.8;">Level up your vocabulary with interactive challenges.</p>
    </div>

    <div id="learning-section">
        <div class="word-card" id="word-card"
            style="background: rgba(255,255,255,0.05); border-radius: 15px; padding: 2rem; margin-bottom: 2rem; border: 1px solid rgba(255,255,255,0.1); transition: transform 0.3s; text-align: center;">
            <h3 id="current-word" style="font-size: 2rem; margin-bottom: 1rem; color: var(--accent-2);">Loading...</h3>
            <p id="current-definition" style="font-size: 1.2rem; margin-bottom: 1rem;"></p>
            <p id="current-example" style="font-style: italic; color: #aaa;"></p>
        </div>

        <div style="display: flex; gap: 1rem; justify-content: center;">
            <button class="btn-primary" onclick="prevWord()">Previous</button>
            <button class="btn-primary" onclick="startQuiz()">Take a Quiz</button>
            <button class="btn-primary" onclick="nextWord()">Next Word</button>
        </div>
    </div>

    <div id="quiz-container"
        style="display:none; margin-top:2rem; background: rgba(0,0,0,0.2); padding: 2rem; border-radius: 15px; border: 1px solid var(--accent-1);">
        <h3 style="margin-bottom: 1rem;">Vocabulary Challenge</h3>
        <p id="quiz-question" style="font-size: 1.2rem; margin-bottom: 1.5rem; border-left: 5px solid var(--accent-1); padding-left: 1rem;"></p>
        <div class="form-group">
            <label style="display: block; margin-bottom: 0.5rem; opacity: 0.8;">What is the 1-Word answer for this definition?</label>
            <input type="text" id="quiz-answer" class="form-input"
                placeholder="e.g. Courage" autocomplete="off">
        </div>
        <div style="display: flex; gap: 1rem; align-items: center; margin-top: 1rem;">
            <button class="btn-primary" onclick="checkAnswer()">Submit Answer</button>
            <span id="quiz-feedback" style="font-weight: bold;"></span>
        </div>
    </div>
</div>

<style>
    .word-card:hover {
        transform: translateY(-5px);
        background: rgba(255, 255, 255, 0.08);
    }
</style>

<script src="{{ url_for('static', filename='js/english_words.js') }}"></script>
{% endblock %}

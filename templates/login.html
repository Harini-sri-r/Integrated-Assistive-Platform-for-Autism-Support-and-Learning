{% extends "base.html" %}

{% block content %}
<div class="glass-panel" style="max-width: 400px; margin: 4rem auto; text-align: center;">
    <h2 class="mb-2" style="font-size: 2rem;">Welcome Back</h2>

    <form action="{{ url_for('login') }}" method="POST">
        <div class="form-group">
            <input type="email" name="email" class="form-input" placeholder="Email Address" required>
        </div>
        <div class="form-group">
            <input type="password" name="password" class="form-input" placeholder="Password" required>
        </div>
        <button type="submit" class="btn-primary" style="width: 100%;">Login</button>
    </form>

    <p class="mt-2" style="font-size: 0.9rem;">
        New here? <a href="{{ url_for('register') }}">Create an account</a>.
    </p>
</div>
{% endblock %}
